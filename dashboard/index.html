<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentOS — Agent Management</title>
    <link rel="stylesheet" href="/trading.css" />
    <style>
      :root {
        --bg:#0b0d12; --desktop:#101722; --panel:#151923; --panel2:#202634; --panel3:#262e3d;
        --line:#303848; --muted:#9aa4b6; --text:#eef2f8; --accent:#71d5ff; --accent2:#8ff0bf;
        --green:#5fe3a1; --amber:#ffbf70; --red:#ff7a90; --purple:#c79bff; --shadow:0 18px 60px #0008;
      }
      * { box-sizing:border-box; }
      body { margin:0; font:14px/1.55 ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); }
      a { color:var(--accent); text-decoration:none; }
      code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; }
      header { display:flex; align-items:center; gap:14px; min-height:48px; padding:9px 18px; border-bottom:1px solid var(--line);
        background:#10141dee; backdrop-filter:blur(14px); position:sticky; top:0; z-index:5; }
      header h1 { font-size:15px; margin:0; letter-spacing:0; }
      header .sub { color:var(--muted); font-size:12px; }
      header .spacer { flex:1; }
      .traffic { display:flex; gap:7px; }
      .dot { width:11px; height:11px; border-radius:50%; background:var(--red); box-shadow:inset 0 0 0 1px #0004; }
      .dot:nth-child(2) { background:var(--amber); } .dot:nth-child(3) { background:var(--green); }
      .brand { display:flex; align-items:center; gap:10px; min-width:190px; }
      .brandmark { width:28px; height:28px; border-radius:8px; display:grid; place-items:center; color:#071017;
        background:linear-gradient(135deg,var(--accent),var(--accent2)); font-weight:800; }
      .menus { display:flex; align-items:center; gap:4px; }
      .menu { position:relative; }
      .menu > button { background:transparent; color:var(--text); border:1px solid transparent; border-radius:7px; padding:6px 9px; cursor:pointer; }
      .menu:hover > button { background:var(--panel2); border-color:var(--line); }
      .menu .drop { display:none; position:absolute; top:34px; left:0; min-width:210px; background:#171d28f8; border:1px solid var(--line);
        border-radius:8px; box-shadow:var(--shadow); padding:6px; }
      .menu:hover .drop { display:block; }
      .drop a, .drop button { display:block; width:100%; color:var(--text); background:transparent; border:none; text-align:left; padding:8px 9px;
        border-radius:6px; cursor:pointer; font-size:13px; }
      .drop a:hover, .drop button:hover { background:var(--panel3); }
      .badge { font-size:11px; padding:3px 9px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
      .badge.mock { color:var(--amber); border-color:#4a3a1f; background:#241c10; }
      .badge.live { color:var(--green); border-color:#1d4533; background:#0f2419; }
      .layout { display:flex; min-height:calc(100vh - 48px); background:
        radial-gradient(circle at top left,#18324b 0,#101722 34%,#0b0d12 100%); }
      nav { width:250px; border-right:1px solid var(--line); padding:14px 10px; flex-shrink:0; background:#0f141df0; }
      nav .group { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.06em; margin:14px 10px 6px; }
      nav button { display:flex; align-items:center; gap:10px; width:100%; text-align:left; background:none; border:1px solid transparent;
        color:var(--text); padding:9px 10px; border-radius:8px; cursor:pointer; font-size:13.5px; }
      nav button:hover { background:var(--panel); border-color:var(--line); }
      nav button.active { background:var(--panel2); color:#fff; border-color:#3d4b61; box-shadow:inset 3px 0 0 var(--accent); }
      .navicon { width:30px; height:30px; border-radius:8px; display:grid; place-items:center; background:#273244; color:var(--accent); font-weight:800; }
      main { flex:1; padding:22px 26px; overflow:auto; }
      h2 { font-size:22px; margin:0 0 4px; letter-spacing:0; }
      .desc { color:var(--muted); margin:0 0 18px; max-width:760px; }
      .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:14px; }
      .card, .window { background:#151a24ee; border:1px solid var(--line); border-radius:8px; padding:16px; box-shadow:0 10px 34px #0004; }
      .window { padding:0; overflow:hidden; margin-bottom:16px; }
      .titlebar { display:flex; align-items:center; gap:9px; padding:10px 13px; background:#202735; border-bottom:1px solid var(--line); }
      .titlebar .wtitle { font-weight:700; font-size:13px; }
      .winbody { padding:16px; }
      .card h3 { margin:0 0 4px; font-size:15px; }
      .card .cdesc { color:var(--muted); font-size:13px; min-height:36px; }
      .pills { display:flex; flex-wrap:wrap; gap:6px; margin:10px 0; }
      .pill { font-size:11px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }
      .m-gemini-3-flash { background:#10261f; color:var(--green); border-color:#1d4533; }
      .m-kimi-k2\.6 { background:#11203a; color:#7fb0ff; border-color:#1f3a63; }
      .m-deepseek-v4-pro { background:#241830; color:var(--purple); border-color:#3a2750; }
      .m-mock { background:#241c10; color:var(--amber); border-color:#4a3a1f; }
      .risk-high { color:var(--red); } .risk-medium { color:var(--amber); } .risk-low { color:var(--green); }
      button.btn { background:var(--accent); color:#06101f; border:none; border-radius:8px; padding:8px 14px;
        font-weight:600; cursor:pointer; font-size:13px; }
      button.btn:hover { filter:brightness(1.08); }
      button.btn.ghost { background:var(--panel2); color:var(--text); border:1px solid var(--line); font-weight:500; }
      button.btn:disabled { opacity:.5; cursor:default; }
      textarea { width:100%; min-height:120px; background:#0c0e13; color:var(--text); border:1px solid var(--line);
        border-radius:8px; padding:10px; font-family:ui-monospace,Menlo,monospace; font-size:12.5px; resize:vertical; }
      pre { white-space:pre-wrap; word-break:break-word; background:#0c0e13; border:1px solid var(--line);
        border-radius:8px; padding:10px; margin:8px 0 0; font-size:12.5px; color:#cdd3df; max-height:340px; overflow:auto; }
      .runbox { margin-top:12px; border-top:1px solid var(--line); padding-top:12px; }
      .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
      .meta { color:var(--muted); font-size:12px; }
      .pipeline { display:flex; align-items:stretch; gap:0; flex-wrap:wrap; margin:6px 0 18px; }
      .pstep { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 12px; min-width:150px; }
      .pstep .pname { font-size:13px; font-weight:600; }
      .arrow { align-self:center; color:var(--muted); padding:0 8px; font-size:18px; }
      table { width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
      th,td { text-align:left; padding:10px 12px; border-bottom:1px solid var(--line); vertical-align:top; }
      th { color:var(--muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
      tr:last-child td { border-bottom:none; }
      .esc { color:var(--amber); font-weight:600; }
      .stats { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px; }
      .stat { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px 18px; min-width:130px; }
      .stat .n { font-size:24px; font-weight:700; } .stat .l { color:var(--muted); font-size:12px; }
      .desktop { display:grid; grid-template-columns:minmax(0,1.7fr) minmax(280px,.9fr); gap:16px; align-items:start; }
      .icon-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(124px,1fr)); gap:12px; }
      .appicon { display:flex; flex-direction:column; gap:7px; align-items:center; justify-content:center; min-height:112px; padding:12px;
        border:1px solid var(--line); border-radius:8px; background:#111822cc; color:var(--text); cursor:pointer; text-align:center; }
      .appicon:hover { background:#1a2330; border-color:#4b5b70; }
      .glyph { width:42px; height:42px; border-radius:10px; display:grid; place-items:center; color:#081018;
        background:linear-gradient(135deg,var(--accent),var(--accent2)); font-weight:900; font-size:19px; }
      .appicon .label { font-weight:700; font-size:12.5px; }
      .split { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
      .terminal { background:#090d12; color:#d9f2e7; border:1px solid #263341; border-radius:8px; padding:12px; font-family:ui-monospace,Menlo,monospace;
        font-size:12px; overflow:auto; }
      .repo-actions { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
      .repo-actions a, .repo-actions button { display:flex; align-items:center; justify-content:center; gap:8px; background:var(--panel2);
        color:var(--text); border:1px solid var(--line); border-radius:8px; padding:10px; cursor:pointer; font-weight:650; }
      .repo-actions a:hover, .repo-actions button:hover { border-color:#557087; background:#263244; }
      .agent-stage { display:grid; gap:14px; margin:18px 0; }
      .agent-chain { position:relative; display:grid; grid-template-columns:repeat(5,minmax(110px,1fr)); gap:12px; align-items:stretch; }
      .agent-chain::before { content:""; position:absolute; left:7%; right:7%; top:50%; height:2px; background:linear-gradient(90deg,#3a4a5f,#71d5ff,#8ff0bf,#3a4a5f);
        opacity:.75; animation:flowline 3.6s linear infinite; }
      .agent-node { position:relative; z-index:1; min-height:108px; display:flex; flex-direction:column; justify-content:space-between;
        padding:13px; border:1px solid #3a4657; border-radius:8px; background:#111923f5; box-shadow:0 14px 32px #0005; overflow:hidden; }
      .agent-node::after { content:""; position:absolute; inset:0; border-top:2px solid transparent; background:linear-gradient(90deg,transparent,#71d5ff55,transparent);
        transform:translateX(-100%); animation:scan 4.2s ease-in-out infinite; pointer-events:none; }
      .agent-node .node-k { color:var(--accent2); font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; }
      .agent-node .node-name { font-size:14px; font-weight:800; line-height:1.2; }
      .agent-node .node-role { color:var(--muted); font-size:12px; }
      .packet { position:absolute; z-index:2; top:calc(50% - 5px); left:7%; width:10px; height:10px; border-radius:999px; background:var(--accent2);
        box-shadow:0 0 18px var(--accent2); animation:packet 3.6s linear infinite; }
      .packet.p2 { animation-delay:1.2s; background:var(--accent); box-shadow:0 0 18px var(--accent); }
      .packet.p3 { animation-delay:2.4s; background:var(--amber); box-shadow:0 0 18px var(--amber); }
      .module-board { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-top:14px; }
      .module-card { position:relative; min-height:118px; padding:14px; border:1px solid var(--line); border-radius:8px; background:#111923d8; overflow:hidden; }
      .module-card::before { content:""; position:absolute; inset:auto 14px 14px 14px; height:3px; border-radius:999px; background:linear-gradient(90deg,var(--accent),var(--accent2));
        transform-origin:left; animation:moduleload 4s ease-in-out infinite; }
      .module-card h3 { margin:0 0 6px; font-size:14px; }
      .module-card p { margin:0; color:var(--muted); font-size:12.5px; }
      .module-chip { display:inline-flex; align-items:center; gap:6px; margin-bottom:9px; color:#071017; background:linear-gradient(135deg,var(--accent),var(--accent2));
        border-radius:7px; padding:4px 7px; font-size:11px; font-weight:900; }
      @keyframes flowline { 0% { filter:hue-rotate(0deg); } 100% { filter:hue-rotate(360deg); } }
      @keyframes packet { 0% { left:7%; opacity:0; } 8% { opacity:1; } 92% { opacity:1; } 100% { left:93%; opacity:0; } }
      @keyframes scan { 0%, 46% { transform:translateX(-100%); } 60%, 100% { transform:translateX(100%); } }
      @keyframes moduleload { 0%, 100% { transform:scaleX(.18); opacity:.55; } 50% { transform:scaleX(1); opacity:1; } }
      @media (prefers-reduced-motion: reduce) {
        .agent-chain::before, .agent-node::after, .packet, .module-card::before { animation:none; }
      }
      .filters { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
      select,input { background:var(--panel); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:7px 9px; font-size:13px; }
      details summary { cursor:pointer; color:var(--muted); font-size:12px; }
      .status-PENDING { color:var(--amber); } .status-APPROVED { color:var(--green); } .status-REJECTED { color:var(--red); }
      .spin { display:inline-block; width:13px; height:13px; border:2px solid var(--line); border-top-color:var(--accent);
        border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; }
      @keyframes s { to { transform:rotate(360deg); } }
      .err { color:var(--red); }
      @media (max-width: 860px) {
        header { flex-wrap:wrap; position:static; }
        .menus { order:3; width:100%; overflow:auto; }
        .layout { display:block; }
        nav { width:auto; display:flex; gap:8px; overflow:auto; border-right:0; border-bottom:1px solid var(--line); }
        nav .group { display:none; }
        nav button { min-width:122px; justify-content:flex-start; }
        main { padding:16px; }
        .desktop, .split, .agent-chain { grid-template-columns:1fr; }
        .agent-chain::before, .packet { display:none; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="traffic"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
      <div class="brand"><span class="brandmark">A</span><div><h1>AgentOS</h1><span class="sub">agent operating workspace</span></div></div>
      <div class="menus">
        <div class="menu"><button>AgentOS</button><div class="drop">
          <a href="/docs">Documentation</a>
        </div></div>
        <div class="menu"><button>Systems</button><div class="drop" id="workflowMenu"></div></div>
        <div class="menu"><button>Repository</button><div class="drop">
          <a href="https://github.com/fintie/agentos" target="_blank" rel="noreferrer">Open GitHub repo</a>
          <a href="https://github.com/fintie/agentos/issues" target="_blank" rel="noreferrer">Issues</a>
          <a href="https://github.com/fintie/agentos/pulls" target="_blank" rel="noreferrer">Pull requests</a>
        </div></div>
      </div>
      <span class="spacer"></span>
      <span id="modeBadge" class="badge">…</span>
    </header>
    <div class="layout">
      <nav id="nav"></nav>
      <main id="main"></main>
    </div>

    <script>
      // ── tiny helpers ──────────────────────────────────────────────
      const $ = (sel, el = document) => el.querySelector(sel);
      const h = (s) => (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
      const json = (v) => h(JSON.stringify(v, null, 2));
      const get = (u) => fetch(u).then((r) => r.json());
      const post = (u, body) => fetch(u, { method: "POST", headers: { "content-type": "application/json" }, body: JSON.stringify(body) }).then((r) => r.json());
      const pill = (cls, txt) => `<span class="pill ${cls}">${h(txt)}</span>`;
      const modelPill = (m) => pill("m-" + m, m);

      const repo = {
        url: "https://github.com/fintie/agentos",
        clone: "git clone https://github.com/fintie/agentos.git",
        branch: "git switch -c feature/agent-workspace",
      };
      const state = { view: "system:trading", useCases: [], agents: [], config: {}, trading: null, tradingProfile: "balanced" };

      // ── boot ──────────────────────────────────────────────────────
      async function boot() {
        [state.useCases, state.agents, state.config, state.trading] = await Promise.all([
          get("/api/usecases"), get("/api/agents"), get("/api/config"), get("/api/trading"),
        ]);
        const badge = $("#modeBadge");
        if (state.config.mockMode || (state.config.liveModels || []).length === 0) {
          badge.className = "badge mock"; badge.textContent = "MOCK MODE";
        } else {
          badge.className = "badge live"; badge.textContent = "LIVE: " + state.config.liveModels.join(", ");
        }
        renderNav();
        renderWorkflowMenu();
        render();
      }

      function renderNav() {
        const ucBtns = state.useCases.map((uc) =>
          `<button data-view="system:${uc.id}"><span class="navicon">${iconFor(uc.id)}</span><span>${h(uc.name)}</span></button>`).join("");
        $("#nav").innerHTML = `
          <div class="group">Agent Systems</div>${ucBtns}`;
        $("#nav").querySelectorAll("button").forEach((b) =>
          b.addEventListener("click", () => { state.view = b.dataset.view; render(); }));
      }

      function renderWorkflowMenu() {
        $("#workflowMenu").innerHTML = state.useCases.map((uc) =>
          `<button onclick="state.view='system:${uc.id}';render()">${h(uc.name)}</button>`).join("");
      }

      function iconFor(id) {
        return ({ trading: "TA", care: "CA", stem: "ST", voice: "VO", developer: "DV", review: "RV", incident: "IN" }[id] || "UC");
      }

      function agentFlow() {
        const workflow = state.useCases.find((uc) => uc.workflow)?.agents || state.agents;
        const nodes = workflow.slice(0, 5).map((agent, i) => ({
          k: ["intake", "parse", "plan", "review", "report"][i] || "agent",
          name: agent.name.replace("Agent", ""),
          role: agent.taskType.replaceAll("_", " "),
        }));
        return `
          <div class="agent-stage">
            <div class="agent-chain">
              <span class="packet"></span><span class="packet p2"></span><span class="packet p3"></span>
              ${nodes.map((node) => `
                <div class="agent-node">
                  <span class="node-k">${h(node.k)}</span>
                  <span class="node-name">${h(node.name)}</span>
                  <span class="node-role">${h(node.role)}</span>
                </div>`).join("")}
            </div>
          </div>`;
      }

      function moduleBoard() {
        return `
          <div class="module-board">
            ${moduleCard("router", "Model Router", "Chooses a model family using risk, latency, context, cost, and health.")}
            ${moduleCard("agents", "Agent Registry", "Composable prompt, schema, task type, and examples for every specialist.")}
            ${moduleCard("flow", "Workflow Runner", "Chains agents into vertical use cases with shared task IDs and audit trails.")}
            ${moduleCard("eval", "Evaluation Store", "Persists outputs, routing traces, confidence, review state, and VFM signals.")}
          </div>`;
      }

      function moduleCard(k, title, desc) {
        return `<div class="module-card"><span class="module-chip">${h(k)}</span><h3>${h(title)}</h3><p>${h(desc)}</p></div>`;
      }

      const sharedModuleMeta = {
        "model-router": ["RT", "Model Router", "Selects a healthy model for risk, latency, cost, and context."],
        "agent-memory": ["MM", "Agent Memory", "Carries structured context and prior outputs between agents."],
        "workflow-runtime": ["WF", "Workflow Runtime", "Coordinates events, dependencies, retries, and task IDs."],
        "evaluation": ["EV", "Evaluation", "Scores confidence, output quality, and value for money."],
        "scheduler": ["SC", "Scheduler", "Runs recurring and event-triggered workflows."],
        "notifications": ["NT", "Notifications", "Delivers approved outputs to configured channels."],
        "human-review": ["HR", "Human Review", "Adds approval gates for consequential decisions."],
        "audit-log": ["AL", "Audit Log", "Preserves evidence, routing, decisions, and review history."],
      };
      function renderSharedModules(uc) {
        return `<div class="module-board">${uc.sharedModules.map((id) => {
          const meta = sharedModuleMeta[id];
          const reused = state.useCases.filter((system) => system.sharedModules.includes(id)).length;
          return `<div class="module-card"><span class="module-chip">${meta[0]}</span><h3>${meta[1]}</h3><p>${meta[2]}</p><span class="meta" style="position:absolute;bottom:13px">shared by ${reused} systems</span></div>`;
        }).join("")}</div>`;
      }

      function setActive() {
        $("#nav").querySelectorAll("button").forEach((b) =>
          b.classList.toggle("active", b.dataset.view === state.view));
      }

      // ── views ─────────────────────────────────────────────────────
      function render() {
        setActive();
        const v = state.view;
        if (v === "system:trading") return renderTradingSystem();
        if (v.startsWith("system:")) return renderUseCase(v.slice(7));
      }

      async function renderOverview() {
        const stats = await get("/api/stats");
        const cards = state.useCases.map((uc) => `
          <button class="appicon" onclick="state.view='uc:${uc.id}';render()">
            <span class="glyph">${iconFor(uc.id)}</span>
            <span class="label">${h(uc.name)}</span>
            <span class="meta">${uc.agents.length} agents${uc.workflow ? " + workflow" : ""}</span>
          </button>`).join("");
        $("#main").innerHTML = `
          <div class="desktop">
            <div class="window">
              <div class="titlebar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="wtitle">AgentOS Desktop</span></div>
              <div class="winbody">
                <h2>Agent operating system</h2>
                <p class="desc">A developer-facing workspace for model routing, multi-agent workflows, plugin-like use cases, evaluation logs, and repository collaboration.</p>
                ${agentFlow()}
                ${moduleBoard()}
                <h3 style="margin:22px 0 10px">Launch surfaces</h3>
                <div class="icon-grid">
                  ${cards}
                  <button class="appicon" onclick="state.view='agents';render()"><span class="glyph">AG</span><span class="label">Agent catalog</span><span class="meta">${state.agents.length} runnable agents</span></button>
                  <button class="appicon" onclick="state.view='developer';render()"><span class="glyph">GIT</span><span class="label">Developer workspace</span><span class="meta">clone, branch, test, PR</span></button>
                  <button class="appicon" onclick="state.view='log';render()"><span class="glyph">LOG</span><span class="label">Evaluation log</span><span class="meta">${stats.total} outputs tracked</span></button>
                </div>
              </div>
            </div>
            <div>
              <div class="window">
                <div class="titlebar"><span class="wtitle">System Monitor</span></div>
                <div class="winbody">
                  <div class="stats">
                    <div class="stat"><div class="n">${state.agents.length}</div><div class="l">agents</div></div>
                    <div class="stat"><div class="n">${state.useCases.length}</div><div class="l">use cases</div></div>
                    <div class="stat"><div class="n">${stats.total}</div><div class="l">logged outputs</div></div>
                    <div class="stat"><div class="n esc">${stats.escalations}</div><div class="l">escalations</div></div>
                    <div class="stat"><div class="n">${stats.pendingReview}</div><div class="l">pending review</div></div>
                  </div>
                </div>
              </div>
              <div class="window">
                <div class="titlebar"><span class="wtitle">Repository</span></div>
                <div class="winbody">
                  <p class="desc">Open-source contribution surface inspired by elizaOS: runtime first, dashboard second, with clear entry points for builders.</p>
                <div class="repo-actions">
                  <a href="${repo.url}" target="_blank" rel="noreferrer">Open repo</a>
                  <a href="/docs">Docs</a>
                  <a href="${repo.url}/issues" target="_blank" rel="noreferrer">Issues</a>
                  <a href="${repo.url}/pulls" target="_blank" rel="noreferrer">Pull requests</a>
                </div>
                </div>
              </div>
            </div>
          </div>`;
      }

      function renderDeveloper() {
        $("#main").innerHTML = `
          <div class="window">
            <div class="titlebar"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="wtitle">Developer Workspace</span></div>
            <div class="winbody">
              <h2>Build on AgentOS</h2>
              <p class="desc">A repo-first workspace for contributors: clone, create a branch, run the dashboard, add agents or workflows, and open a pull request.</p>
              <div class="repo-actions" style="margin-bottom:14px">
                <a href="${repo.url}" target="_blank" rel="noreferrer">GitHub</a>
                <a href="${repo.url}/fork" target="_blank" rel="noreferrer">Fork</a>
                <a href="${repo.url}/issues/new" target="_blank" rel="noreferrer">New issue</a>
                <a href="${repo.url}/compare" target="_blank" rel="noreferrer">Open PR</a>
              </div>
              <div class="split">
                <div class="card">
                  <h3>Quick start</h3>
                  <div class="terminal">$ ${repo.clone}
$ cd agentos
$ npm install
$ npm test
$ npm run dashboard</div>
                </div>
                <div class="card">
                  <h3>Contribution path</h3>
                  <div class="terminal">$ ${repo.branch}
$ npm run typecheck
$ npm run build:pages
$ git add .
$ git commit -m "Improve agent workspace"
$ git push origin HEAD</div>
                </div>
              </div>
              <h3 style="margin:18px 0 10px">Extension points</h3>
              <div class="grid">
                ${devCard("Agents", "Add declarative agent metadata, prompt builders, and schemas in src/agents.")}
                ${devCard("Workflows", "Compose specialist agents into vertical flows in src/workflows and register them in the catalog.")}
                ${devCard("Models", "Add adapters behind the shared ModelAdapter interface and let the router pick them.")}
                ${devCard("Evaluations", "Use the audit log and review statuses to compare routing decisions and output quality.")}
              </div>
            </div>
          </div>`;
      }

      function devCard(title, desc) {
        return `<div class="card"><h3>${h(title)}</h3><div class="cdesc">${h(desc)}</div></div>`;
      }

      function renderUseCase(id) {
        const uc = state.useCases.find((u) => u.id === id);
        if (!uc) return;
        let pipeline = "";
        if (uc.workflow) {
          const steps = uc.agents.filter((a) => a.name !== "IncidentDraftAgent" || uc.id !== "care");
          pipeline = `
            <h3 style="margin:18px 0 6px">Workflow pipeline</h3>
            <div class="pipeline">${steps.map((a, i) => `
              ${i ? '<span class="arrow">→</span>' : ""}
              <div class="pstep"><div class="pname">${h(a.name.replace("Agent",""))}</div>${modelPill(a.routedModel)}</div>`).join("")}
            </div>
            <div class="row" style="margin-bottom:8px">
              <button class="btn" onclick="runWorkflow('${uc.workflow.id}')">Run ${h(uc.workflow.name)}</button>
              <span class="meta">routes through ${steps.length} agents and logs each step</span>
            </div>
            <div id="wfInput"></div>
            <div id="wfResult"></div>`;
        }
        $("#main").innerHTML = `
          <h2>${h(uc.name)}</h2>
          <p class="desc">${h(uc.description)}</p>
          <h3 style="margin:18px 0 8px">Shared AgentOS modules</h3>
          ${renderSharedModules(uc)}
          ${pipeline}
          <h3 style="margin:22px 0 10px">Specialist agents</h3>
          <div class="grid" id="ucAgents"></div>`;
        $("#ucAgents").innerHTML = uc.agents.map(agentCard).join("");
        if (uc.workflow) prepWorkflowInput(uc.workflow.id);
      }

      function renderAgents(list, title, desc) {
        // Group agents by which use case(s) they appear in.
        const byUc = state.useCases.map((uc) => ({
          uc, agents: list.filter((a) => uc.agents.some((x) => x.name === a.name)),
        })).filter((g) => g.agents.length);
        $("#main").innerHTML = `
          <h2>${h(title)}</h2><p class="desc">${h(desc)}</p>
          ${byUc.map((g) => `
            <h3 style="margin:18px 0 10px">${h(g.uc.name)}</h3>
            <div class="grid">${g.agents.map(agentCard).join("")}</div>`).join("")}`;
      }

      function agentCard(a) {
        const id = "run_" + a.name;
        return `
          <div class="card">
            <div class="row"><h3>${h(a.name)}</h3><span class="spacer"></span>${modelPill(a.routedModel)}</div>
            <div class="cdesc">${h(a.description)}</div>
            <div class="pills">
              ${pill("", a.taskType)}
              <span class="pill risk-${a.defaultRisk}">${a.defaultRisk} risk</span>
              ${a.multimodal ? pill("", "multimodal") : ""}
              ${pill("", a.promptVersion)}
              ${a.live ? "" : pill("m-mock", "mock")}
            </div>
            <div class="row">
              <button class="btn ghost" onclick="toggleRun('${id}','${a.name}')">Run agent</button>
              <details><summary>schema</summary><pre>${json(a.schema)}</pre></details>
            </div>
            <div class="runbox" id="${id}" style="display:none"></div>
          </div>`;
      }

      window.toggleRun = (id, name) => {
        const box = document.getElementById(id);
        if (box.style.display === "none") {
          const agent = state.agents.find((a) => a.name === name);
          box.style.display = "block";
          box.innerHTML = `
            <div class="meta" style="margin-bottom:6px">Input (JSON)</div>
            <textarea id="${id}_in">${json(agent.example)}</textarea>
            <div class="row" style="margin-top:8px">
              <button class="btn" onclick="runAgent('${id}','${name}')">Run</button>
              <span id="${id}_status" class="meta"></span>
            </div>
            <div id="${id}_out"></div>`;
        } else { box.style.display = "none"; }
      };

      window.runAgent = async (id, name) => {
        const ta = document.getElementById(id + "_in");
        const status = document.getElementById(id + "_status");
        const out = document.getElementById(id + "_out");
        let input;
        try { input = JSON.parse(ta.value); }
        catch { out.innerHTML = `<pre class="err">Invalid JSON input.</pre>`; return; }
        status.innerHTML = '<span class="spin"></span> running…';
        const r = await post("/api/run/agent", { agentName: name, input });
        status.textContent = "";
        if (!r.ok) { out.innerHTML = `<pre class="err">${h(r.error)}</pre>`; return; }
        out.innerHTML = `
          <div class="row" style="margin-top:10px">
            ${modelPill(r.model)}
            <span class="meta">confidence ${Number(r.confidence).toFixed(2)}</span>
            ${r.decision.escalated ? '<span class="esc">⇧ escalated</span>' : ""}
            <span class="meta">rule: ${h(r.decision.ruleId)}</span>
          </div>
          <pre>${json(r.parsed)}</pre>
          <details><summary>raw output</summary><pre>${h(r.raw)}</pre></details>`;
      };

      function prepWorkflowInput(wfId) {
        const uc = state.useCases.find((u) => u.workflow && u.workflow.id === wfId);
        const example = (uc.agents[0] && uc.agents[0].example) || {};
        $("#wfInput").innerHTML = `
          <details style="margin-bottom:10px"><summary>edit workflow input</summary>
            <textarea id="wf_in" style="margin-top:8px">${json(example)}</textarea></details>`;
      }

      window.runWorkflow = async (wfId) => {
        const ta = document.getElementById("wf_in");
        let input;
        try { input = ta ? JSON.parse(ta.value) : undefined; }
        catch { $("#wfResult").innerHTML = `<pre class="err">Invalid JSON input.</pre>`; return; }
        $("#wfResult").innerHTML = '<div class="meta"><span class="spin"></span> running workflow…</div>';
        const r = await post("/api/run/workflow", { workflowId: wfId, input });
        if (!r.ok) { $("#wfResult").innerHTML = `<pre class="err">${h(r.error)}</pre>`; return; }
        $("#wfResult").innerHTML = `
          <div class="meta" style="margin:6px 0">task ${h(r.taskId)}</div>
          ${r.steps.map((s, i) => `
            <div class="card" style="margin-bottom:10px">
              <div class="row">
                <b>${i + 1}. ${h(s.agent)}</b> ${modelPill(s.model)}
                <span class="meta">conf ${Number(s.confidence).toFixed(2)}</span>
                ${s.escalated ? '<span class="esc">⇧ escalated</span>' : ""}
                ${s.ruleId ? `<span class="meta">${h(s.ruleId)}</span>` : ""}
              </div>
              <details><summary>output</summary><pre>${json(s.output)}</pre></details>
            </div>`).join("")}`;
      };

      // ── evaluation log ────────────────────────────────────────────
      async function renderLog() {
        $("#main").innerHTML = `
          <h2>Evaluation log</h2>
          <p class="desc">Every AI output: routing decision, model, confidence, reviewer, and human-review status.</p>
          <div class="filters">
            <input id="fTask" placeholder="filter by taskId…" />
            <select id="fModel">
              <option value="">all models</option>
              <option>gemini-3-flash</option><option>kimi-k2.6</option><option>deepseek-v4-pro</option>
            </select>
            <button class="btn ghost" onclick="loadLog()">Refresh</button>
          </div>
          <table><thead><tr>
            <th>Time</th><th>Agent</th><th>Model</th><th>Routing</th><th>Conf</th><th>Review by</th><th>Human</th><th>Output</th>
          </tr></thead><tbody id="logRows"></tbody></table>`;
        $("#fTask").addEventListener("input", loadLog);
        $("#fModel").addEventListener("change", loadLog);
        loadLog();
      }

      window.loadLog = async () => {
        const qs = new URLSearchParams();
        const t = $("#fTask")?.value.trim(); const m = $("#fModel")?.value;
        if (t) qs.set("taskId", t); if (m) qs.set("modelName", m);
        const records = await get("/api/records?" + qs);
        $("#logRows").innerHTML = records.map((r) => {
          const dec = (r.routingTrace || {}).decision || {};
          const human = r.humanReviewStatus === "PENDING"
            ? `<span class="status-PENDING">PENDING</span><br><button class="btn ghost" style="padding:3px 7px;margin-top:4px" onclick="review('${r.id}','APPROVED')">approve</button> <button class="btn ghost" style="padding:3px 7px" onclick="review('${r.id}','REJECTED')">reject</button>`
            : `<span class="status-${r.humanReviewStatus}">${r.humanReviewStatus}</span>`;
          return `<tr>
            <td class="meta">${new Date(r.createdAt).toLocaleTimeString()}</td>
            <td>${h(r.agentName)}</td>
            <td>${modelPill(r.modelName)}</td>
            <td style="max-width:240px"><code>${h(dec.ruleId || "-")}</code> ${dec.escalated ? '<span class="esc">⇧</span>' : ""}<div class="meta">${h(dec.reason || "")}</div></td>
            <td>${Number(r.confidenceScore).toFixed(2)}</td>
            <td class="meta">${h(r.reviewModel || "-")}</td>
            <td>${human}</td>
            <td><details><summary>view</summary><pre>${json(r.parsedOutput)}</pre></details></td>
          </tr>`;
        }).join("") || `<tr><td colspan="8" class="meta">No records yet — run an agent or workflow, or <code>npm run seed</code>.</td></tr>`;
      };

      window.review = async (id, status) => { await post("/api/records/" + id + "/review", { status }); loadLog(); };

      boot();
    </script>
    <script src="/trading.js"></script>
  </body>
</html>
